spring.application.name=book_review

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bookreview}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:bookreview-secret-key-2024-very-long-and-secure}
jwt.expiration=86400000

spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}